name: Check

on:
  push:
  pull_request:

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    # Skip Husky hook installation in CI. `bun install` runs the `prepare`
    # script (`bunx husky`), which would otherwise install the pre-push hook
    # and make `changesets/action`'s git push run the whole test suite.
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Clear Storybook's Vite dep-optimizer cache to avoid the intermittent
      # "Failed to fetch dynamically imported module …/@storybook_addon-docs…"
      # race that causes ~25 % of cold CI runs to fail on the first attempt.
      - name: Clear Storybook cache
        run: rm -rf node_modules/.cache/storybook

      # `playwright` is a devDependency of the storybook/web workspace only,
      # so there is no top-level node_modules/.bin/playwright. Running
      # `bunx playwright` from the repo root therefore fetches the *latest*
      # playwright from npm and installs that version's browser build, which
      # doesn't match the playwright@1.61.1 the tests launch with (they then
      # fail with "Executable doesn't exist at …/chromium_headless_shell-1228").
      # Invoke the workspace's own pinned playwright instead.
      - name: Install Playwright browser
        run: bun run --cwd storybook/web playwright install --with-deps chromium

      - name: Lint
        run: bun run lint

      - name: Validate exports map
        run: node packages/ui/scripts/check-exports.mjs

      - name: Check no hardcoded colors
        run: node packages/ui/scripts/check-no-hardcoded-colors.mjs

      - name: Typecheck
        run: bun run typecheck

      - name: Test (Storybook / Vitest)
        run: bun run test
