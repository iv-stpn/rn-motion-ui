name: Check

on:
  push:
  pull_request:

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Clear Storybook's Vite dep-optimizer cache to avoid the intermittent
      # "Failed to fetch dynamically imported module …/@storybook_addon-docs…"
      # race that causes ~25 % of cold CI runs to fail on the first attempt.
      - name: Clear Storybook cache
        run: rm -rf node_modules/.cache/storybook

      - name: Install Playwright browser
        run: bunx playwright install chromium --with-deps

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test (Storybook / Vitest)
        run: bun run test
