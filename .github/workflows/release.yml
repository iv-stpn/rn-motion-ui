name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# changesets/action needs to push the version branch + tags and open the
# "Version Packages" PR. New repos default to a read-only GITHUB_TOKEN,
# so grant these explicitly.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip Husky hook installation in CI. `bun install` runs the `prepare`
    # script (`bunx husky`), which would otherwise install the pre-push hook;
    # when changesets/action pushes the Version Packages PR, that hook fires
    # `bun run test` (browser tests) in a job with no Playwright browser,
    # failing the push. Tests already run in the Check workflow.
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          # No `registry-url` here: it would point npm's userconfig at a file
          # that reads the unset NODE_AUTH_TOKEN, superseding the ~/.npmrc the
          # changesets action writes from NPM_TOKEN and breaking authentication.
          package-manager-cache: false

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
